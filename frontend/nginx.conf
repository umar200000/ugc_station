server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA — barcha so'rovlarni index.html ga yo'naltirish
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Yuklangan rasmlar
    location /uploads/ {
        proxy_pass http://backend:3000;
    }
}
