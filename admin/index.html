<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UGC Admin Panel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --p:#2563EB;--p-dark:#1D4ED8;--p-bg:rgba(37,99,235,0.07);
      --g:#10B981;--g-bg:rgba(16,185,129,0.08);
      --r:#EF4444;--r-bg:rgba(239,68,68,0.07);
      --w:#F59E0B;--w-bg:rgba(245,158,11,0.1);
      --bg:#F8FAFC;--card:#fff;--t:#0F172A;--t2:#475569;--t3:#94A3B8;
      --b:rgba(15,23,42,0.06);--bs:rgba(15,23,42,0.08);
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100vh}
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-card{background:var(--card);border-radius:24px;padding:40px 32px;max-width:380px;width:100%;box-shadow:0 8px 30px rgba(15,23,42,0.1);text-align:center}
    .login-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#0F172A,#334155);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px}
    .login-title{font-size:22px;font-weight:800;margin-bottom:6px}
    .login-sub{font-size:14px;color:var(--t2);margin-bottom:28px}
    .input{width:100%;padding:12px 16px;border:2px solid var(--b);border-radius:12px;font-size:14px;font-family:inherit;outline:none;transition:.2s;background:var(--card)}
    .input:focus{border-color:var(--p);box-shadow:0 0 0 4px var(--p-bg)}
    .btn{padding:12px 20px;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px;justify-content:center}
    .btn-p{background:linear-gradient(135deg,var(--p),var(--p-dark));color:#fff;width:100%}
    .btn-p:hover{box-shadow:0 4px 16px rgba(37,99,235,0.3)}
    .btn-p:disabled{opacity:.5;cursor:not-allowed}
    .btn-s{background:var(--bg);border:1.5px solid var(--bs);color:var(--t2)}
    .btn-s:hover{border-color:var(--p);color:var(--p)}
    .btn-g{background:var(--g-bg);color:var(--g);border:1.5px solid transparent}
    .btn-r{background:var(--r-bg);color:var(--r);border:1.5px solid transparent}
    .btn-w{background:var(--w-bg);color:#92400E;border:1.5px solid transparent}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:8px}
    .login-error{color:var(--r);font-size:13px;margin-top:12px;font-weight:600;display:none}

    .dash{display:none;max-width:1200px;margin:0 auto;padding:20px}
    .dash-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
    .dash-title{font-size:24px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:10px}
    .dash-actions{display:flex;gap:8px}

    .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
    .stat{background:var(--card);border-radius:16px;padding:18px;border:1px solid var(--b)}
    .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:18px}
    .stat-val{font-size:28px;font-weight:800}
    .stat-lbl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

    .tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
    .tab{padding:10px 18px;border-radius:12px;border:1.5px solid var(--b);background:var(--card);color:var(--t2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
    .tab.on{border-color:var(--p);background:var(--p-bg);color:var(--p)}
    .tab:hover{border-color:var(--p)}
    .cnt{font-size:11px;font-weight:700;background:var(--b);padding:2px 7px;border-radius:100px}
    .tab.on .cnt{background:var(--p);color:#fff}

    .table-wrap{background:var(--card);border-radius:16px;border:1px solid var(--b);overflow:hidden}
    .tbl{width:100%;border-collapse:collapse}
    .tbl th{text-align:left;padding:12px 16px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--b);background:var(--bg)}
    .tbl td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--b);vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:rgba(37,99,235,0.02)}
    .name{font-weight:700;color:var(--t)}
    .meta{font-size:11px;color:var(--t3);margin-top:2px}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:700}
    .b-active{background:var(--g-bg);color:var(--g)}
    .b-closed{background:var(--r-bg);color:var(--r)}
    .b-pending{background:var(--w-bg);color:#92400E}
    .b-accepted{background:var(--g-bg);color:var(--g)}
    .b-rejected{background:var(--r-bg);color:var(--r)}
    .b-approved{background:var(--g-bg);color:var(--g)}
    .b-company{background:var(--g-bg);color:var(--g)}
    .b-influencer{background:var(--p-bg);color:var(--p)}
    .b-admin{background:var(--w-bg);color:#92400E}
    .b-new{background:var(--b);color:var(--t3)}
    .del{width:32px;height:32px;border-radius:8px;background:var(--r-bg);border:none;color:var(--r);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.2s}
    .del:hover{background:var(--r);color:#fff}
    .empty{text-align:center;padding:40px;color:var(--t3);font-size:14px}
    .avatar{width:32px;height:32px;border-radius:8px;object-fit:cover;background:var(--p-bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--p);overflow:hidden;flex-shrink:0}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .row{display:flex;align-items:center;gap:10px}
    .search{margin-bottom:16px}

    .modal-bg{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:20px}
    .modal-bg.open{display:flex}
    .modal{background:var(--card);border-radius:20px;padding:28px 24px;max-width:360px;width:100%;text-align:center}
    .modal-icon{width:52px;height:52px;border-radius:14px;background:var(--r-bg);color:var(--r);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px}
    .modal h3{font-size:17px;font-weight:700;margin-bottom:8px}
    .modal p{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:18px}
    .modal-acts{display:flex;gap:8px}
    .modal-acts .btn{flex:1}

    .video-thumb{width:60px;height:60px;border-radius:8px;object-fit:cover;background:#000}
    .review-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;padding:0}
    .review-modal.open{display:flex}
    .review-sheet{background:var(--card);border-radius:20px 20px 0 0;padding:24px;max-width:480px;width:100%;max-height:80vh;overflow-y:auto}
    .review-sheet h3{font-size:18px;font-weight:700;margin-bottom:4px}
    .review-sheet .subtitle{font-size:13px;color:var(--t2);margin-bottom:16px}
    .reason-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
    .reason-chip{padding:7px 14px;border-radius:100px;font-size:12.5px;font-weight:600;border:1.5px solid var(--bs);background:var(--bg);color:var(--t2);cursor:pointer;transition:.2s;font-family:inherit}
    .reason-chip.on{border-color:var(--r);background:var(--r-bg);color:var(--r)}
    .review-textarea{width:100%;padding:10px 14px;border:2px solid var(--b);border-radius:12px;font-size:13px;font-family:inherit;outline:none;resize:none;min-height:70px;transition:.2s}
    .review-textarea:focus{border-color:var(--p);box-shadow:0 0 0 4px var(--p-bg)}
    .review-actions{display:flex;gap:8px;margin-top:14px}
    @media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr)}.tbl th,.tbl td{padding:10px 12px;font-size:12px}.tabs{gap:4px}.dash{padding:12px}}
  </style>
</head>
<body>

<div id="loginPage" class="login-wrap">
  <div class="login-card">
    <div class="login-icon">&#128737;</div>
    <h1 class="login-title">Admin Panel</h1>
    <p class="login-sub">UGC Marketplace boshqaruv paneli</p>
    <input type="password" id="pw" class="input" placeholder="Parolni kiriting..." onkeydown="if(event.key==='Enter')doLogin()" style="margin-bottom:16px">
    <button class="btn btn-p" onclick="doLogin()" id="loginBtn">Kirish</button>
    <div id="loginErr" class="login-error"></div>
  </div>
</div>

<div id="dash" class="dash">
  <div class="dash-head">
    <h1 class="dash-title">&#128737; UGC Admin</h1>
    <div class="dash-actions">
      <button class="btn btn-s" onclick="loadAll()">&#128260; Yangilash</button>
      <button class="btn btn-s" onclick="doLogout()">Chiqish</button>
    </div>
  </div>

  <div class="stats" id="statsGrid"></div>

  <div class="search">
    <input class="input" id="searchInput" placeholder="Qidirish..." oninput="filterTable()">
  </div>

  <div class="tabs" id="tabsWrap"></div>

  <div class="table-wrap">
    <table class="tbl"><thead id="thead"></thead><tbody id="tbody"></tbody></table>
  </div>
</div>

<!-- Video review modal -->
<div class="review-modal" id="reviewModal">
  <div class="review-sheet">
    <div style="display:flex;justify-content:center;margin-bottom:14px"><div style="width:36px;height:4px;border-radius:100px;background:var(--bs)"></div></div>
    <h3 id="reviewTitle">Videoni tekshirish</h3>
    <p class="subtitle" id="reviewSubtitle"></p>
    <div id="reviewReasons" style="display:none">
      <p style="font-size:13px;font-weight:600;color:var(--t3);margin-bottom:8px">Sabablarni tanlang:</p>
      <div class="reason-chips" id="reasonChips"></div>
    </div>
    <textarea class="review-textarea" id="reviewComment" placeholder="Izoh yozing..."></textarea>
    <div class="review-actions">
      <button class="btn btn-s" style="flex:1" onclick="closeReview()">Bekor</button>
      <button class="btn" id="reviewSubmitBtn" style="flex:1" onclick="submitReview()">Tasdiqlash</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-icon">&#9888;</div>
    <h3>O'chirishni tasdiqlang</h3>
    <p id="modalText"></p>
    <div class="modal-acts">
      <button class="btn btn-s" onclick="closeModal()">Bekor</button>
      <button class="btn btn-r" id="modalBtn" onclick="confirmDelete()">O'chirish</button>
    </div>
  </div>
</div>

<script>
const API=(location.hostname==='localhost'?'http://localhost:3000':'')+'/api/admin';
let token=localStorage.getItem('admin_token');
let delTarget=null;
let currentTab='users';
let allData={};

async function doLogin(){
  const btn=document.getElementById('loginBtn'),err=document.getElementById('loginErr');
  btn.disabled=true;err.style.display='none';
  try{
    const r=await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pw').value})});
    const d=await r.json();if(!r.ok)throw new Error(d.error);
    token=d.token;localStorage.setItem('admin_token',token);showDash();
  }catch(e){err.textContent=e.message;err.style.display='block'}
  finally{btn.disabled=false}
}
function doLogout(){token=null;localStorage.removeItem('admin_token');document.getElementById('dash').style.display='none';document.getElementById('loginPage').style.display='flex'}
function api(p,o={}){return fetch(API+p,{...o,headers:{...o.headers,Authorization:'Bearer '+token,'Content-Type':'application/json'}})}

async function showDash(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('dash').style.display='block';
  await loadAll();
}

async function loadAll(){
  try{
    const[sr,ur,cr,ir,ar,apr,subr]=await Promise.all([api('/stats'),api('/users'),api('/companies'),api('/influencers'),api('/ads'),api('/applications'),api('/submissions')]);
    if(sr.status===401){doLogout();return}
    const stats=await sr.json();
    allData.users=(await ur.json()).users||[];
    allData.companies=(await cr.json()).companies||[];
    allData.influencers=(await ir.json()).influencers||[];
    allData.ads=(await ar.json()).ads||[];
    allData.applications=(await apr.json()).applications||[];
    allData.submissions=(await subr.json()).submissions||[];
    renderStats(stats);renderTabs();renderTable();
  }catch(e){console.error(e)}
}

function renderStats(s){
  const items=[
    {l:'Foydalanuvchilar',v:s.users,c:'var(--p-bg)',ic:'&#128101;'},
    {l:'Kompaniyalar',v:s.companies,c:'var(--g-bg)',ic:'&#127970;'},
    {l:'Influenserlar',v:s.influencers,c:'#F3E8FF',ic:'&#128100;'},
    {l:"E'lonlar",v:s.ads,c:'var(--w-bg)',ic:'&#128227;'},
    {l:'Faol e\'lonlar',v:s.activeAds,c:'var(--g-bg)',ic:'&#9889;'},
    {l:'Arizalar',v:s.applications,c:'var(--p-bg)',ic:'&#128203;'},
    {l:'Kutilmoqda',v:s.pendingApps,c:'var(--w-bg)',ic:'&#9200;'},
    {l:'Videolar',v:s.submissions,c:'#FEE2E2',ic:'&#127909;'},
    {l:'Tekshiruv kutmoqda',v:s.pendingVideos,c:'var(--w-bg)',ic:'&#9203;'},
  ];
  document.getElementById('statsGrid').innerHTML=items.map(i=>`<div class="stat"><div class="stat-icon" style="background:${i.c}">${i.ic}</div><div class="stat-val">${i.v}</div><div class="stat-lbl">${i.l}</div></div>`).join('');
}

const tabConfig=[
  {key:'users',label:'Foydalanuvchilar',ic:'&#128101;'},
  {key:'companies',label:'Kompaniyalar',ic:'&#127970;'},
  {key:'influencers',label:'Influenserlar',ic:'&#128100;'},
  {key:'ads',label:"E'lonlar",ic:'&#128227;'},
  {key:'applications',label:'Arizalar',ic:'&#128203;'},
  {key:'submissions',label:'Videolar',ic:'&#127909;'},
];

function renderTabs(){
  document.getElementById('tabsWrap').innerHTML=tabConfig.map(t=>
    `<button class="tab ${currentTab===t.key?'on':''}" onclick="switchTab('${t.key}')">${t.ic} ${t.label} <span class="cnt">${(allData[t.key]||[]).length}</span></button>`
  ).join('');
}

function switchTab(t){currentTab=t;renderTabs();renderTable();document.getElementById('searchInput').value=''}

function fmtDate(d){if(!d)return'—';const dt=new Date(d);const m=['Yan','Fev','Mar','Apr','May','Iyn','Iyl','Avg','Sen','Okt','Noy','Dek'];return`${dt.getDate()} ${m[dt.getMonth()]} ${dt.getFullYear()}`}

function roleBadge(r){
  if(r==='COMPANY')return'<span class="badge b-company">Kompaniya</span>';
  if(r==='INFLUENCER')return'<span class="badge b-influencer">Influenser</span>';
  if(r==='ADMIN')return'<span class="badge b-admin">Admin</span>';
  return'<span class="badge b-new">Yangi</span>';
}
function statusBadge(s){
  const m={ACTIVE:'b-active',CLOSED:'b-closed',PENDING:'b-pending',ACCEPTED:'b-accepted',REJECTED:'b-rejected',APPROVED:'b-approved'};
  const l={ACTIVE:'Faol',CLOSED:'Yopiq',PENDING:'Kutilmoqda',ACCEPTED:'Qabul',REJECTED:'Rad',APPROVED:'Tasdiqlangan'};
  return`<span class="badge ${m[s]||'b-new'}">${l[s]||s}</span>`;
}
function avatarHtml(url,name){
  if(url&&url.startsWith('/'))return`<div class="avatar"><img src="${url}"></div>`;
  return`<div class="avatar">${(name||'?')[0]}</div>`;
}

function renderTable(){
  const data=allData[currentTab]||[];
  let h='',rows='';

  if(currentTab==='users'){
    h='<tr><th>Foydalanuvchi</th><th>Telefon</th><th>Rol</th><th>Holat</th><th>Sana</th><th></th></tr>';
    rows=data.map(u=>{
      const n=u.company?.name||u.influencer?.name||u.firstName||'—';
      return`<tr data-s="${n} ${u.username} ${u.phone||''}"><td><div class="row">${avatarHtml(u.photoUrl,n)}<div><div class="name">${n}</div><div class="meta">@${u.username||'—'}</div></div></div></td><td>${u.phone||'—'}</td><td>${roleBadge(u.role)}</td><td>${u.onboarded?statusBadge('ACTIVE'):statusBadge('PENDING')}</td><td>${fmtDate(u.createdAt)}</td><td>${u.role!=='ADMIN'?`<button class="del" onclick="openModal('user','${u.id}','${n.replace(/'/g,'')}')">&#128465;</button>`:''}</td></tr>`;
    }).join('');
  }
  else if(currentTab==='companies'){
    h='<tr><th>Kompaniya</th><th>Soha</th><th>Telefon</th><th>E\'lonlar</th><th>Sana</th><th></th></tr>';
    rows=data.map(c=>`<tr data-s="${c.name} ${c.industry} ${c.user?.phone||''}"><td><div class="name">${c.name}</div><div class="meta">@${c.user?.username||'—'}</div></td><td>${c.industry}</td><td>${c.user?.phone||'—'}</td><td><span class="badge b-active">${c._count?.ads||0}</span></td><td>${fmtDate(c.user?.createdAt)}</td><td><button class="del" onclick="openModal('company','${c.id}','${c.name.replace(/'/g,'')}')">&#128465;</button></td></tr>`).join('');
  }
  else if(currentTab==='influencers'){
    h='<tr><th>Influenser</th><th>Yo\'nalish</th><th>Telefon</th><th>Arizalar</th><th>Sana</th><th></th></tr>';
    rows=data.map(i=>`<tr data-s="${i.name} ${i.category} ${i.user?.phone||''}"><td><div class="row">${avatarHtml(i.user?.photoUrl,i.name)}<div><div class="name">${i.name}</div><div class="meta">@${i.user?.username||'—'}</div></div></div></td><td><div style="max-width:200px">${(i.category||'').split(',').map(c=>`<span class="badge b-influencer" style="margin:2px">${c.trim()}</span>`).join('')}</div></td><td>${i.user?.phone||'—'}</td><td><span class="badge b-pending">${i._count?.applications||0}</span></td><td>${fmtDate(i.user?.createdAt)}</td><td><button class="del" onclick="openModal('influencer','${i.id}','${i.name.replace(/'/g,'')}')">&#128465;</button></td></tr>`).join('');
  }
  else if(currentTab==='ads'){
    h='<tr><th>E\'lon</th><th>Kompaniya</th><th>Turi</th><th>Holati</th><th>Arizalar</th><th></th></tr>';
    rows=data.map(a=>`<tr data-s="${a.title} ${a.company?.name||''}"><td><div class="name">${a.title}</div></td><td>${a.company?.name||'—'}</td><td>${a.adType==='PAID'?`<span class="badge b-pending">${(a.payment||0).toLocaleString()} so'm</span>`:'<span class="badge b-active">Barter</span>'}</td><td>${statusBadge(a.status)} <button class="btn btn-sm ${a.status==='ACTIVE'?'btn-r':'btn-g'}" onclick="toggleAdStatus('${a.id}','${a.status}')" style="margin-left:4px">${a.status==='ACTIVE'?'Yopish':'Ochish'}</button></td><td><span class="badge b-pending">${a._count?.applications||0}</span></td><td><button class="del" onclick="openModal('ad','${a.id}','${a.title.replace(/'/g,'')}')">&#128465;</button></td></tr>`).join('');
  }
  else if(currentTab==='applications'){
    h='<tr><th>Influenser</th><th>E\'lon</th><th>Kompaniya</th><th>Holati</th><th>Videolar</th><th>Sana</th></tr>';
    rows=data.map(a=>{
      const inf=a.influencer;const ad=a.ad;
      return`<tr data-s="${inf?.name||''} ${ad?.title||''} ${ad?.company?.name||''}"><td><div class="row">${avatarHtml(inf?.user?.photoUrl,inf?.name)}<div><div class="name">${inf?.name||'—'}</div><div class="meta">${inf?.user?.phone||'—'}</div></div></div></td><td>${ad?.title||'—'}</td><td>${ad?.company?.name||'—'}</td><td>${statusBadge(a.status)} ${a.status==='PENDING'?`<button class="btn btn-sm btn-g" onclick="setAppStatus('${a.id}','ACCEPTED')">&#10004;</button><button class="btn btn-sm btn-r" onclick="setAppStatus('${a.id}','REJECTED')" style="margin-left:4px">&#10006;</button>`:''}</td><td><span class="badge b-active">${a._count?.submissions||0}</span></td><td>${fmtDate(a.createdAt)}</td></tr>`;
    }).join('');
  }
  else if(currentTab==='submissions'){
    h='<tr><th>Video</th><th>Influenser</th><th>E\'lon</th><th>Holati</th><th>Sana</th><th>Amal</th></tr>';
    rows=data.map(s=>{
      const inf=s.application?.influencer;const ad=s.application?.ad;
      const commentInfo=s.comment?`<div class="meta" style="margin-top:4px">💬 ${s.comment}</div>`:'';
      return`<tr data-s="${inf?.name||''} ${ad?.title||''}"><td><video src="${s.videoUrl}#t=0.5" class="video-thumb" preload="auto" onclick="this.paused?this.play():this.pause()"></video></td><td><div class="row">${avatarHtml(inf?.user?.photoUrl,inf?.name)}<div><div class="name">${inf?.name||'—'}</div></div></div></td><td>${ad?.title||'—'}<div class="meta">${ad?.company?.name||''}</div></td><td>${statusBadge(s.status)}${commentInfo}</td><td>${fmtDate(s.createdAt)}</td><td>${s.status==='PENDING'?`<button class="btn btn-sm btn-g" onclick="openReview('${s.id}','APPROVED')">✅ Tasdiqlash</button> <button class="btn btn-sm btn-r" onclick="openReview('${s.id}','REJECTED')">❌ Rad etish</button>`:s.reviewedBy==='ADMIN'?'<span class="meta">Admin tekshirgan</span>':''} <button class="del" onclick="openModal('submission','${s.id}','Video')">&#128465;</button></td></tr>`;
    }).join('');
  }

  document.getElementById('thead').innerHTML=h;
  document.getElementById('tbody').innerHTML=rows||'<tr><td colspan="10" class="empty">Ma\'lumot yo\'q</td></tr>';
}

function filterTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const s=tr.dataset.s||tr.textContent;
    tr.style.display=s.toLowerCase().includes(q)?'':'none';
  });
}

async function toggleAdStatus(id,cur){
  const ns=cur==='ACTIVE'?'CLOSED':'ACTIVE';
  await api(`/ad/${id}/status`,{method:'PATCH',body:JSON.stringify({status:ns})});
  await loadAll();
}
async function setAppStatus(id,status){
  await api(`/application/${id}/status`,{method:'PATCH',body:JSON.stringify({status})});
  await loadAll();
}
const REJECT_REASONS=['Video sifati past','Mahsulot to\'g\'ri ko\'rsatilmagan','Ovoz yozuvi sifatsiz','Video formati noto\'g\'ri','Kontent mos emas','Montaj sifatsiz','Video juda qisqa','Video juda uzun'];
let reviewState={id:null,action:null,selectedReasons:[]};

function openReview(id,action){
  reviewState={id,action,selectedReasons:[]};
  document.getElementById('reviewComment').value='';
  document.getElementById('reviewTitle').textContent=action==='APPROVED'?'Videoni tasdiqlash':'Videoni rad etish';
  document.getElementById('reviewSubtitle').textContent=action==='APPROVED'?'Izoh qoldiring (ixtiyoriy)':'Sababini ko\'rsating';
  const reasonsDiv=document.getElementById('reviewReasons');
  const btn=document.getElementById('reviewSubmitBtn');
  if(action==='REJECTED'){
    reasonsDiv.style.display='block';
    document.getElementById('reasonChips').innerHTML=REJECT_REASONS.map((r,i)=>`<button class="reason-chip" data-idx="${i}" onclick="toggleChip(this,${i})">${r}</button>`).join('');
    btn.className='btn btn-r';btn.textContent='Rad etish';
  }else{
    reasonsDiv.style.display='none';
    btn.className='btn btn-g';btn.textContent='Tasdiqlash';
  }
  document.getElementById('reviewModal').classList.add('open');
}
function closeReview(){document.getElementById('reviewModal').classList.remove('open');reviewState={id:null,action:null,selectedReasons:[]}}
function toggleChip(el,idx){
  const r=REJECT_REASONS[idx];
  const i=reviewState.selectedReasons.indexOf(r);
  if(i>=0){reviewState.selectedReasons.splice(i,1);el.classList.remove('on')}
  else{reviewState.selectedReasons.push(r);el.classList.add('on')}
}
async function submitReview(){
  if(!reviewState.id)return;
  const parts=[];
  if(reviewState.selectedReasons.length>0)parts.push(reviewState.selectedReasons.join(', '));
  const extra=document.getElementById('reviewComment').value.trim();
  if(extra)parts.push(extra);
  const comment=parts.join('. ');
  if(reviewState.action==='REJECTED'&&!comment){alert('Rad etish uchun sabab yozing');return}
  const btn=document.getElementById('reviewSubmitBtn');btn.disabled=true;btn.textContent='...';
  try{
    await api(`/submission/${reviewState.id}/status`,{method:'PATCH',body:JSON.stringify({status:reviewState.action,comment:comment||undefined})});
    closeReview();await loadAll();
  }catch(e){alert('Xatolik')}
  finally{btn.disabled=false}
}

function openModal(type,id,name){
  delTarget={type,id};
  document.getElementById('modalText').innerHTML=`<strong>"${name}"</strong> ni o'chirmoqchimisiz?`;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){delTarget=null;document.getElementById('modal').classList.remove('open')}
async function confirmDelete(){
  if(!delTarget)return;
  const btn=document.getElementById('modalBtn');btn.disabled=true;btn.textContent="O'chirilmoqda...";
  try{await api(`/${delTarget.type}/${delTarget.id}`,{method:'DELETE'});closeModal();await loadAll()}
  catch(e){alert('Xatolik')}
  finally{btn.disabled=false;btn.textContent="O'chirish"}
}

if(token)showDash();
</script>
